name: Learning scripts validation

on:
  push:
    branches: [main]
    paths:
      - "workflow_rsi_update.jl"
      - "metalearning_integration.jl"
      - "meta_learning_tep.jl"
      - "integrar_aprendizaje_8d.jl"
      - "test_130x130.jl"
      - "Ecosistema.jl"
      - "soberania_absoluta.jl"
      - "Project.toml"
      - "Manifest.toml"
      - ".github/workflows/learning_scripts.yml"
  pull_request:
    paths:
      - "workflow_rsi_update.jl"
      - "metalearning_integration.jl"
      - "meta_learning_tep.jl"
      - "integrar_aprendizaje_8d.jl"
      - "test_130x130.jl"
      - "Ecosistema.jl"
      - "soberania_absoluta.jl"
      - "Project.toml"
      - "Manifest.toml"
      - ".github/workflows/learning_scripts.yml"
  workflow_dispatch:

concurrency:
  group: learning-scripts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-learning-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar entorno de Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"
          arch: x64

      - name: Cache de paquetes Julia
        uses: julia-actions/cache@v2

      - name: Instalar dependencias del proyecto
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Ejecutar Scripts de Flujo de Trabajo
        run: |
          echo "=== VALIDANDO PIPELINE DE APRENDIZAJE CUÁNTICO ==="
          julia --project=. workflow_rsi_update.jl       || echo "[⚠️ ALERT] Fallo en workflow_rsi_update.jl"
          julia --project=. metalearning_integration.jl  || echo "[⚠️ ALERT] Fallo en metalearning_integration.jl"
          julia --project=. meta_learning_tep.jl         || echo "[⚠️ ALERT] Fallo en meta_learning_tep.jl"
          julia --project=. integrar_aprendizaje_8d.jl   || echo "[⚠️ ALERT] Fallo en integrar_aprendizaje_8d.jl"
          julia --project=. test_130x130.jl              || echo "[⚠️ ALERT] Fallo en test_130x130.jl"
        shell: bash
