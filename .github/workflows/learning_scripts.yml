name: Learning scripts validation

on:
  push:
    branches: [main]
    paths:
      - "workflow_rsi_update.jl"
      - "metalearning_integration.jl"
      - "meta_learning_tep.jl"
      - "integrar_aprendizaje_8d.jl"
      - "test_130x130.jl"
      - "Ecosistema.jl"
      - "soberania_absoluta.jl"
      - "Project.toml"
      - "Manifest.toml"
      - ".github/workflows/learning_scripts.yml"
  pull_request:
    paths:
      - "workflow_rsi_update.jl"
      - "metalearning_integration.jl"
      - "meta_learning_tep.jl"
      - "integrar_aprendizaje_8d.jl"
      - "test_130x130.jl"
      - "Ecosistema.jl"
      - "soberania_absoluta.jl"
      - "Project.toml"
      - "Manifest.toml"
      - ".github/workflows/learning_scripts.yml"
  workflow_dispatch:

concurrency:
  group: learning-scripts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-learning-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"
          arch: x64

      - name: Cache Julia packages
        uses: julia-actions/cache@v2

      - name: Install dependencies
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Run workflow scripts
        run: |
          julia --project=. workflow_rsi_update.jl
          julia --project=. metalearning_integration.jl
          julia --project=. meta_learning_tep.jl
          julia --project=. integrar_aprendizaje_8d.jl
          julia --project=. test_130x130.jl
