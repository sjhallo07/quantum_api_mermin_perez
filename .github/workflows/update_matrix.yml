name: Automatización y Actualización de Matrices Cuánticas

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Otorgamos permisos para que el workflow pueda escribir cambios en el repositorio
permissions:
  contents: write

jobs:
  run-julia:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar entorno de Julia
      uses: julia-actions/setup-julia@v2
      with:
        version: '1.10'

    - name: Instalar dependencias del proyecto
      run: |
        julia --project=. -e 'import Pkg; Pkg.instantiate()'

    - name: Ejecutar Extracción de Matrices
      run: |
        julia extraer_matrices.jl

    # PASO NUEVO: Si el JSON cambió, el bot de GitHub hace un commit automático de vuelta
    - name: Autoguardar matriz actualizada en el repositorio
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add matrices_output.json
        # Solo hace commit si el archivo realmente cambió para evitar bucles
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: actualización automática de matrices [skip ci]" && git push)
