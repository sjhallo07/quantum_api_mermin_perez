name: Automatización y Actualización de Matrices Cuánticas

on:
  push:
    branches:
      - main
    paths:
      - "**/*.jl"
      - "Project.toml"
      - "Manifest.toml"
      - "matrices_output.json"
      - ".github/workflows/update_matrix.yml"
  workflow_dispatch:

concurrency:
  group: update-matrix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Otorgamos permisos para que el workflow pueda escribir cambios en el repositorio
permissions:
  contents: write

jobs:
  run-julia:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar entorno de Julia
      uses: julia-actions/setup-julia@v2
      with:
        version: '1.10'
        arch: x64

    - name: Cache de paquetes Julia
      uses: julia-actions/cache@v2

    - name: Instalar dependencias del proyecto
      run: |
        julia --project=. -e 'import Pkg; Pkg.instantiate()'

    - name: Validar Ecosistema y Distributions
      run: |
        julia --project=. -e 'include("Ecosistema.jl"); using .Ecosistema; @assert size(METRICA_SOBERANA_5D) == (5, 5); println("Ecosistema.jl + Distributions.jl loaded successfully")'

    - name: Ejecutar Extracción de Matrices
      run: |
        julia extraer_matrices.jl

    - name: Autoguardar matriz actualizada en el repositorio
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        if git status --porcelain -- matrices_output.json | grep -q .; then
          git add matrices_output.json
          git commit -m "chore: actualización automática de matrices [skip ci]"
          git push
        fi
