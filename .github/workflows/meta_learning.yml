name: Meta-learning scripts

on:
  push:
    branches: [main]
    paths:
      - "test_learning.jl"
      - "test_escalabilidad.jl"
      - "workflow_rsi_update.jl"
      - "metalearning_integration.jl"
      - "meta_learning_tep.jl"
      - "integrar_aprendizaje_8d.jl"
      - "Ecosistema.jl"
      - "soberania_absoluta.jl"
      - "Project.toml"
      - "Manifest.toml"
      - ".github/workflows/meta_learning.yml"
  pull_request:
    paths:
      - "test_learning.jl"
      - "test_escalabilidad.jl"
      - "workflow_rsi_update.jl"
      - "metalearning_integration.jl"
      - "meta_learning_tep.jl"
      - "integrar_aprendizaje_8d.jl"
      - "Ecosistema.jl"
      - "soberania_absoluta.jl"
      - "Project.toml"
      - "Manifest.toml"
      - ".github/workflows/meta_learning.yml"
  workflow_dispatch:

concurrency:
  group: meta-learning-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-meta-learning-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar entorno de Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"
          arch: x64

      - name: Cache de paquetes Julia
        uses: julia-actions/cache@v2

      - name: Instalar dependencias del proyecto
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Ejecutar Suite de Meta-Aprendizaje Cuántico
        run: |
          println("=== DISPARANDO RÁFAGA DE ALTA ESCALA ===")
          julia --project=. test_learning.jl          || echo "[⚠️ ALERT] Fallo en test_learning.jl"
          julia --project=. test_escalabilidad.jl     || echo "[⚠️ ALERT] Fallo en test_escalabilidad.jl"
          julia --project=. workflow_rsi_update.jl    || echo "[⚠️ ALERT] Fallo en workflow_rsi_update.jl"
          julia --project=. metalearning_integration.jl || echo "[⚠️ ALERT] Fallo en metalearning_integration.jl"
          julia --project=. meta_learning_tep.jl       || echo "[⚠️ ALERT] Fallo en meta_learning_tep.jl"
          julia --project=. integrar_aprendizaje_8d.jl || echo "[⚠️ ALERT] Fallo en integrar_aprendizaje_8d.jl"
        shell: bash
